<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>出張日当管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f5f8;
    --surface: #ffffff;
    --surface2: #eeeef2;
    --border: #dddde4;
    --accent: #c0392b;
    --accent2: #7b5ea7;
    --success: #27ae60;
    --danger: #e74c3c;
    --warning: #f39c12;
    --text: #2c3e50;
    --text2: #7f8c8d;
    --text3: #bdc3c7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ログイン画面 */
  #login-screen {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
  }

  .logo-area { text-align: center; margin-bottom: 48px; }

  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), #e74c3c);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 32px;
    box-shadow: 0 4px 20px rgba(192,57,43,0.25);
  }

  .logo-title {
    font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--accent); font-weight: 700;
  }

  .logo-sub { font-size: 12px; color: var(--text2); margin-top: 4px; letter-spacing: 0.1em; }

  .login-card {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 24px;
  }

  .form-label { font-size: 12px; color: var(--text2); letter-spacing: 0.1em; margin-bottom: 8px; display: block; }

  .form-input {
    width: 100%; background: #fff;
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; color: var(--text); font-size: 16px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
  }

  .form-input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none; border-radius: 14px; padding: 16px;
    color: white; font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 12px rgba(192,57,43,0.3);
  }

  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }

  .btn-biometric {
    width: 100%; margin-top: 12px; padding: 14px;
    background: #fff; border: 2px solid var(--accent); border-radius: 14px;
    color: var(--accent); font-size: 15px; font-weight: 600;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .btn-biometric:active { opacity: 0.7; transform: scale(0.98); }

  /* メイン画面 */
  #main-screen { display: none; min-height: 100vh; min-height: 100dvh; }

  .top-bar {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }

  .top-bar-user { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
  .top-bar-position {
    display: inline-block; background: var(--accent); color: white;
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; margin-left: 6px; vertical-align: middle;
  }
  .top-bar-date { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }

  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; color: var(--text2); font-size: 12px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .content { padding: 20px; }

  /* セグメントコントロール */
  .segment-control {
    display: flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 4px; margin-bottom: 16px;
  }

  .segment-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    background: none; color: var(--text2); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
  }

  .segment-btn.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(192,57,43,0.2); }

  .segment-view { display: none; }
  .segment-view.active { display: block; }

  /* ステータスカード */
  .status-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; margin-bottom: 16px;
    position: relative; overflow: hidden;
  }

  .status-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .status-card.idle::before { background: var(--border); }
  .status-card.traveling::before { background: var(--accent); }
  .status-card.done::before { background: var(--success); }

  .status-label { font-size: 11px; letter-spacing: 0.15em; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
  .status-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .status-idle { color: var(--text2); }
  .status-moving { color: var(--accent); }
  .status-complete { color: var(--success); }

  .gps-info {
    font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace;
    margin-top: 8px; word-break: break-all;
  }

  /* アクションボタン */
  .action-btn {
    width: 100%; border: none; border-radius: 20px; padding: 28px 20px;
    font-size: 20px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    margin-bottom: 12px; letter-spacing: 0.05em;
  }

  .action-btn:active { transform: scale(0.97); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .action-btn .btn-icon { font-size: 36px; }
  .action-btn .btn-sub { font-size: 12px; font-weight: 400; opacity: 0.7; }

  .btn-depart {
    background: #fff;
    border: 2px solid var(--accent); color: var(--accent);
    box-shadow: 0 4px 16px rgba(192,57,43,0.12);
  }

  .btn-arrive {
    background: #fff;
    border: 2px solid var(--success); color: var(--success);
    box-shadow: 0 4px 16px rgba(39,174,96,0.12);
  }

  .btn-disabled-state {
    background: var(--surface2); border: 2px solid var(--border); color: var(--text3);
  }

  /* 結果カード */
  .result-card {
    background: #fff;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; margin-bottom: 16px; display: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }

  .result-row:last-child { border-bottom: none; }
  .result-label { font-size: 13px; color: var(--text2); }
  .result-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
  .result-allowance { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; color: var(--success); }

  /* 入力セクション */
  .input-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px; margin-bottom: 16px;
  }

  .section-title {
    font-size: 12px; letter-spacing: 0.12em; color: var(--text2);
    text-transform: uppercase; margin-bottom: 16px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group:last-child { margin-bottom: 0; }

  textarea.form-input {
    resize: none; height: 80px; line-height: 1.6;
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px;
  }

  /* 出張日程セクション */
  .acc-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; margin-bottom: 16px;
  }

  .acc-rate-display {
    background: #fff;
    border: 1px solid var(--accent2); border-radius: 14px;
    padding: 16px; margin-bottom: 20px; text-align: center;
    box-shadow: 0 2px 12px rgba(123,94,167,0.1);
  }

  .acc-rate-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .acc-rate-value {
    font-family: 'DM Mono', monospace; font-size: 28px;
    font-weight: 700; color: var(--accent2);
  }

  .trip-date-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    transition: all 0.2s;
  }
  .trip-date-row.last-day { border-color: var(--accent); background: #fff5f5; }
  .trip-date-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .trip-date-label {
    font-size: 14px; font-weight: 600;
  }
  .trip-date-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; color: white;
  }
  .trip-date-detail {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    display: none;
  }
  .trip-date-detail.open { display: block; }
  .trip-detail-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 8px; outline: none;
  }
  .trip-detail-input:focus { border-color: var(--accent2); }
  .trip-summary-bar {
    background: linear-gradient(135deg, #7b5ea7, #9b59b6);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
    color: white; display: none;
  }
  .trip-summary-bar .trip-sum-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .trip-summary-bar .trip-sum-label { font-size: 12px; opacity: 0.8; }
  .trip-summary-bar .trip-sum-value {
    font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700;
  }

  .form-input-date {
    width: 100%; background: #fff;
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; color: var(--text); font-size: 16px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
    -webkit-appearance: none;
  }

  .form-input-date:focus { border-color: var(--accent); }

  /* 送信ボタン */
  .btn-submit {
    background: var(--success);
    border: none; border-radius: 16px; padding: 18px;
    color: white; font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    width: 100%; letter-spacing: 0.05em; transition: all 0.2s;
    display: none; margin-bottom: 16px;
  }

  .btn-submit:active { opacity: 0.8; transform: scale(0.98); }

  .btn-acc-submit {
    background: var(--accent2);
    border: none; border-radius: 16px; padding: 18px;
    color: white; font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    width: 100%; letter-spacing: 0.05em; transition: all 0.2s;
  }

  .btn-acc-submit:active { opacity: 0.8; transform: scale(0.98); }
  .btn-acc-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 履歴 */
  .history-section { margin-top: 8px; }
  .history-title { font-size: 13px; color: var(--text2); letter-spacing: 0.1em; margin-bottom: 12px; text-transform: uppercase; }

  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
  }

  .history-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .history-distance { font-size: 16px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .history-allowance { font-size: 14px; color: var(--success); font-family: 'DM Mono', monospace; }
  .history-purpose { font-size: 12px; color: var(--text2); margin-top: 6px; }

  .record-type-badge {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 10px; font-weight: 600; margin-right: 6px;
  }

  .badge-travel { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-accommodation { background: rgba(123,94,167,0.15); color: var(--accent2); }

  /* GPS取得中 */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .gps-loading { animation: pulse 1.2s infinite; color: var(--accent); }

  /* トースト */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 24px; font-size: 14px;
    z-index: 999; transition: transform 0.3s; white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* タブ */
  .tab-bar {
    display: flex; background: var(--surface);
    border-top: 1px solid var(--border); position: sticky; bottom: 0;
  }

  .tab-btn {
    flex: 1; padding: 12px 8px; background: none; border: none;
    color: var(--text3); font-size: 10px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px; transition: color 0.2s;
  }

  .tab-btn.active { color: var(--accent); }
  .tab-btn .tab-icon { font-size: 20px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; }

  /* === 新幹線アニメーション === */
  .train-scene {
    display: none; position: relative; height: 110px; margin: 16px 0;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0F6 40%, #e0f0e8 65%, #c8d8c0 72%, #999 72%, #888 100%);
    border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
  }
  .train-scene.active { display: block; }

  /* 富士山シルエット */
  .train-scene::before {
    content: ''; position: absolute; bottom: 32px; left: 15%;
    width: 0; height: 0;
    border-left: 60px solid transparent; border-right: 60px solid transparent;
    border-bottom: 45px solid rgba(100,130,160,0.15);
    z-index: 0;
  }
  .train-scene::after {
    content: ''; position: absolute; bottom: 67px; left: calc(15% + 30px);
    width: 0; height: 0;
    border-left: 15px solid transparent; border-right: 15px solid transparent;
    border-bottom: 10px solid rgba(255,255,255,0.6);
    z-index: 0;
  }

  /* レール */
  .train-rail {
    position: absolute; bottom: 10px; left: 0; right: 0; height: 3px;
    background: linear-gradient(180deg, #666 0%, #888 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .train-rail::before {
    content: ''; position: absolute; top: -3px; left: 0; right: 0; height: 3px;
    background: linear-gradient(180deg, #777 0%, #999 100%);
  }
  .train-rail::after {
    content: ''; position: absolute; top: 3px; left: 0; right: 0; height: 2px;
    background: repeating-linear-gradient(90deg, #777 0, #777 16px, transparent 16px, transparent 24px);
    animation: railScroll 0.3s linear infinite;
  }
  .train-scene.stopping .train-rail::after {
    animation: railScroll 1.5s linear infinite;
  }
  @keyframes railScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-24px); }
  }

  /* 新幹線 */
  .shinkansen {
    position: absolute; bottom: 14px; left: -420px; z-index: 3;
    animation: trainRun 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25));
  }
  .train-scene.running .shinkansen {
    left: calc(50% - 200px);
    animation: trainLoop 1.5s ease-in-out infinite;
  }
  .train-scene.stopping .shinkansen {
    animation: trainStop 2s ease-out forwards;
  }
  @keyframes trainRun {
    0% { left: -420px; }
    100% { left: calc(50% - 200px); }
  }
  @keyframes trainLoop {
    0% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(4px) translateY(-0.5px); }
    50% { transform: translateX(6px) translateY(0); }
    75% { transform: translateX(4px) translateY(0.5px); }
    100% { transform: translateX(0) translateY(0); }
  }
  @keyframes trainStop {
    0% { opacity: 1; left: calc(50% - 200px); }
    60% { opacity: 1; left: calc(50% - 190px); }
    100% { opacity: 0; left: calc(50% - 180px); }
  }

  /* スピードライン */
  .train-speed-lines {
    position: absolute; bottom: 20px; left: 0; right: 0; height: 30px;
    z-index: 1; opacity: 0.4;
  }
  .train-speed-lines::before, .train-speed-lines::after {
    content: ''; position: absolute; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
    animation: speedLine 0.6s linear infinite;
  }
  .train-speed-lines::before { top: 8px; left: 0; width: 60px; animation-delay: 0s; }
  .train-speed-lines::after { top: 20px; left: 10%; width: 40px; animation-delay: 0.3s; }
  .train-scene.stopping .train-speed-lines { opacity: 0; transition: opacity 1s; }
  @keyframes speedLine {
    0% { transform: translateX(100vw); opacity: 1; }
    100% { transform: translateX(-100px); opacity: 0; }
  }

  /* 風景（流れる背景） */
  .train-scenery {
    position: absolute; bottom: 14px; left: 0; right: 0; height: 60px; z-index: 1;
    background: repeating-linear-gradient(90deg,
      transparent 0, transparent 100px,
      rgba(0,0,0,0.03) 100px, rgba(0,0,0,0.03) 102px
    );
    animation: sceneryFlow 1.2s linear infinite;
  }
  .train-scene.stopping .train-scenery {
    animation: sceneryFlow 5s linear infinite;
  }
  @keyframes sceneryFlow {
    0% { transform: translateX(0); }
    100% { transform: translateX(-102px); }
  }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="logo-area">
    <div class="logo-icon">🚄</div>
    <div class="logo-title">出張日当管理</div>
    <div class="logo-sub">TRAVEL ALLOWANCE TRACKER</div>
  </div>
  <div class="login-card">
    <label class="form-label">会社コード</label>
    <input type="text" class="form-input" id="company-code" placeholder="会社コード" autocomplete="organization" style="font-size:15px;font-family:'DM Mono',monospace;">
    <label class="form-label">ログインID</label>
    <input type="text" class="form-input" id="login-id" placeholder="login_id" autocomplete="username" style="font-size:15px;">
    <label class="form-label">パスワード</label>
    <div style="position:relative;">
      <input type="text" class="form-input pw-peek" id="password-input" placeholder="••••••••" autocomplete="off" data-pw="" style="padding-right:44px;">
      <button type="button" onclick="togglePwPeek('password-input', this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;color:var(--text3);">👁</button>
    </div>
    <button class="btn-primary" onclick="login()">ログイン</button>
    <button class="btn-biometric" id="btn-biometric" onclick="biometricLogin()" style="display:none;">
      <span style="font-size:24px;">🔐</span>
      <span>生体認証でログイン</span>
    </button>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="top-bar">
    <div>
      <div id="top-bar-company" style="font-size:10px;color:var(--text3);letter-spacing:0.1em;"></div>
      <div class="top-bar-user">
        <span id="user-name"></span>
        <span class="top-bar-position" id="user-position"></span>
      </div>
      <div class="top-bar-date" id="today-date"></div>
    </div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>

  <!-- 生体認証登録バナー -->
  <div id="biometric-banner" style="display:none;margin:12px 20px 0;padding:14px 16px;background:#fff;border:2px solid var(--accent);border-radius:14px;box-shadow:0 2px 12px rgba(192,57,43,0.1);">
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">🔐 次回から生体認証でログイン</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Face ID / Touch ID を登録すると、次回からパスワード入力なしでログインできます。</div>

// ===== オフライン対応 =====
const OFFLINE_QUEUE_KEY = 'trip_offline_queue';
const OFFLINE_STATE_KEY = 'trip_offline_state';
let isOnline = navigator.onLine;

function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); }
  catch { return []; }
}

function saveOfflineQueue(queue) {
  localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
  updateOfflineBadge();
}

function addToOfflineQueue(records) {
  const queue = getOfflineQueue();
  if (Array.isArray(records)) {
    queue.push(...records);
  } else {
    queue.push(records);
  }
  saveOfflineQueue(queue);
}

function updateOfflineBadge() {
  const badge = document.getElementById('offline-badge');
  const count = getOfflineQueue().length;
  if (badge) {
    badge.style.display = count > 0 ? 'block' : 'none';
    badge.textContent = '未同期: ' + count + '件';
  }
}

function updateOnlineStatus() {
  isOnline = navigator.onLine;
  const banner = document.getElementById('offline-banner');
  if (banner) {
    banner.style.display = isOnline ? 'none' : 'flex';
  }
  if (isOnline) {
    syncOfflineQueue();
  }
}

async function syncOfflineQueue() {
  const queue = getOfflineQueue();
  if (queue.length === 0) return;

  const banner = document.getElementById('offline-banner');
  if (banner) {
    banner.style.display = 'flex';
    banner.querySelector('span').textContent = '同期中... (' + queue.length + '件)';
    banner.style.background = '#2563eb';
  }

  const failed = [];
  for (const record of queue) {
    try {
      const { error } = await db.from('trip_records').insert(record);
      if (error) failed.push(record);
    } catch {
      failed.push(record);
    }
  }

  saveOfflineQueue(failed);

  if (banner) {
    if (failed.length === 0) {
      banner.querySelector('span').textContent = '同期完了！';
      banner.style.background = '#059669';
      setTimeout(() => { banner.style.display = 'none'; }, 2000);
      showToast('オフラインデータを同期しました (' + queue.length + '件)', 'success');
      loadHistory();
    } else {
      banner.querySelector('span').textContent = failed.length + '件の同期に失敗';
      banner.style.background = '#dc2626';
      setTimeout(() => updateOnlineStatus(), 3000);
    }
  }
}

// 移動中の状態をローカルに保存（アプリ終了対策）
function saveTravelState() {
  if (state.phase === 'idle') {
    localStorage.removeItem(OFFLINE_STATE_KEY);
    return;
  }
  localStorage.setItem(OFFLINE_STATE_KEY, JSON.stringify({
    phase: state.phase,
    departTime: state.departTime ? state.departTime.toISOString() : null,
    arriveTime: state.arriveTime ? state.arriveTime.toISOString() : null,
    departGPS: state.departGPS,
    arriveGPS: state.arriveGPS,
    distance: state.distance,
    allowance: state.allowance,
    tier: state.tier,
  }));
}

function restoreTravelState() {
  try {
    const saved = JSON.parse(localStorage.getItem(OFFLINE_STATE_KEY));
    if (!saved || saved.phase === 'idle') return false;
    state.phase = saved.phase;
    state.departTime = saved.departTime ? new Date(saved.departTime) : null;
    state.arriveTime = saved.arriveTime ? new Date(saved.arriveTime) : null;
    state.departGPS = saved.departGPS;
    state.arriveGPS = saved.arriveGPS;
    state.distance = saved.distance;
    state.allowance = saved.allowance;
    state.tier = saved.tier;
    return true;
  } catch { return false; }
}

async function loadConfig() {
  if (!currentCompanyCode) return;
  const { data } = await db.from('app_config').select('*').eq('company_code', currentCompanyCode).single();
  if (data && data.positions) {
    CONFIG.positions = data.positions;
  }
}

function getPositionConfig() {
  if (!currentEmployee) return CONFIG.positions[0];
  return CONFIG.positions.find(p => p.name === currentEmployee.position) || CONFIG.positions[0];
}

function getTravelTier(km) {
  const pos = getPositionConfig();
  if (!pos || !pos.travel_tiers) return { label: '不明', allowance: 0 };
  return pos.travel_tiers.find(t => km >= t.min && km < t.max) || pos.travel_tiers[pos.travel_tiers.length - 1];
}

function getAccommodationAllowance() {
  const pos = getPositionConfig();
  return pos ? pos.daily_allowance || 0 : 0;
}

// ===== ログイン =====
// パスワード入力：最後の1文字だけ表示、前の文字は●
function setupPwPeek(input) {
  let realPw = '';
  let timer = null;
  let showAll = false;

  function render(showLast) {
    if (showAll) { input.value = realPw; return; }
    if (realPw.length === 0) { input.value = ''; return; }
    if (showLast) {
      input.value = '●'.repeat(realPw.length - 1) + realPw.slice(-1);
    } else {
      input.value = '●'.repeat(realPw.length);
    }
  }

  input.addEventListener('input', () => {
    if (showAll) { realPw = input.value; input.dataset.pw = realPw; return; }
    const v = input.value;
    const maskCount = (v.match(/●/g) || []).length;
    const plainChars = v.replace(/●/g, '');

    if (v.length < realPw.length && plainChars.length === 0) {
      // 削除
      const deleteCount = realPw.length - v.length;
      const pos = input.selectionStart;
      realPw = realPw.slice(0, pos) + realPw.slice(pos + deleteCount);
    } else if (plainChars.length > 0) {
      // 入力
      const pos = input.selectionStart;
      const insertPos = pos - plainChars.length;
      const beforeMask = realPw.length - (v.length - plainChars.length);
      realPw = realPw.slice(0, insertPos) + plainChars + realPw.slice(insertPos + Math.max(0, beforeMask));
    }
    input.dataset.pw = realPw;
    clearTimeout(timer);
    render(true);
    const cursorPos = input.selectionStart;
    timer = setTimeout(() => {
      render(false);
      input.setSelectionRange(cursorPos, cursorPos);
    }, 600);
  });

  input._pwShowAll = (show) => { showAll = show; render(!show); };
  input._getPw = () => realPw;
  input._resetPw = () => { realPw = ''; input.value = ''; input.dataset.pw = ''; };
}

function togglePwPeek(id, btn) {
  const input = document.getElementById(id);
  const isHidden = btn.textContent === '👁';
  input._pwShowAll(isHidden);
  btn.textContent = isHidden ? '🙈' : '👁';
}

document.querySelectorAll('.pw-peek').forEach(setupPwPeek);

// ===== 生体認証 (WebAuthn) =====
let pendingBiometricCompanyCode = null;
let pendingBiometricLoginId = null;
let pendingBiometricPassword = null;

function bufToBase64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function base64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

function showBiometricBanner(companyCode, loginId, pw) {
  pendingBiometricCompanyCode = companyCode;
  pendingBiometricLoginId = loginId;
  pendingBiometricPassword = pw;
  document.getElementById('biometric-banner').style.display = 'block';
}

function dismissBiometricBanner() {
  document.getElementById('biometric-banner').style.display = 'none';
  pendingBiometricCompanyCode = null;
  pendingBiometricLoginId = null;
  pendingBiometricPassword = null;
}

async function doBiometricRegister() {
  if (!pendingBiometricLoginId) return;
  try {
    const userId = new TextEncoder().encode(pendingBiometricLoginId);
    const challenge = crypto.getRandomValues(new Uint8Array(32));

    const credential = await navigator.credentials.create({
      publicKey: {
        challenge: challenge,
        rp: { name: '出張日当管理', id: location.hostname },
        user: { id: userId, name: pendingBiometricLoginId, displayName: pendingBiometricLoginId },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },
          { type: 'public-key', alg: -257 }
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000
      }
    });

    localStorage.setItem('webauthn_cred', JSON.stringify({
      credId: bufToBase64(credential.rawId),
      companyCode: pendingBiometricCompanyCode,
      loginId: pendingBiometricLoginId,
      password: pendingBiometricPassword
    }));

    dismissBiometricBanner();
    showToast('生体認証を登録しました', 'success');
  } catch (e) {
    showToast('生体認証の登録に失敗しました', 'error');
    console.error('WebAuthn register error:', e);
  }
}

async function biometricLogin() {
  const stored = localStorage.getItem('webauthn_cred');
  if (!stored) return;

  const { credId, companyCode, loginId, password } = JSON.parse(stored);

  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));

    await navigator.credentials.get({
      publicKey: {
        challenge: challenge,
        allowCredentials: [{
          type: 'public-key',
          id: base64ToBuf(credId),
          transports: ['internal']
        }],
        userVerification: 'required',
        timeout: 60000
      }
    });

    // 会社コード検証
    const cc = companyCode || 'default';
    const { data: company } = await db.from('companies').select('*').eq('company_code', cc).single();
    if (!company) {
      localStorage.removeItem('webauthn_cred');
      showToast('会社情報が変更されました。再ログインしてください', 'error');
      return;
    }
    currentCompanyCode = cc;
    currentCompanyName = company.company_name;

    const { data } = await db
      .from('employees')
      .select('*')
      .eq('company_code', cc)
      .eq('login_id', loginId)
      .eq('password', password)
      .single();

    if (!data) {
      localStorage.removeItem('webauthn_cred');
      showToast('認証情報が変更されました。再ログインしてください', 'error');
      return;
    }

    currentEmployee = data;
    await loadConfig();

    document.getElementById('user-name').textContent = data.name;
    document.getElementById('user-position').textContent = data.position;
    document.getElementById('top-bar-company').textContent = currentCompanyName;
    const accRate = getAccommodationAllowance();
    document.getElementById('acc-rate').textContent = '¥' + accRate.toLocaleString();

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    document.getElementById('main-screen').style.flexDirection = 'column';
    updateDate();
    loadHistory();
    afterLogin();
    showToast(data.name + ' さん、こんにちは', 'success');

  } catch (e) {
    showToast('認証がキャンセルされました', 'error');
    console.error('WebAuthn auth error:', e);
  }
}

// ===== GPS取得 =====
function getGPS() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('このブラウザはGPSに対応していません'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

// ===== ハーバーサイン計算 =====
function calcDistance(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2) ** 2 +
            Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
            Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ===== 出発 =====
async function depart() {
  const btn = document.getElementById('btn-depart');
  btn.disabled = true;

  document.getElementById('status-text').textContent = 'GPS取得中...';
  document.getElementById('status-text').className = 'status-value gps-loading';
  document.getElementById('gps-info').textContent = '現在地を取得しています...';

  try {
    const gps = await getGPS();
    state.departGPS = gps;
    state.departTime = new Date();
    state.phase = 'traveling';

    document.getElementById('status-card').className = 'status-card traveling';
    document.getElementById('status-text').textContent = '移動中';
    document.getElementById('status-text').className = 'status-value status-moving';
    document.getElementById('gps-info').innerHTML =
      `出発: ${state.departTime.toLocaleTimeString('ja-JP')}<br>` +
      `📍 ${gps.lat.toFixed(6)}, ${gps.lng.toFixed(6)}<br>` +
      `精度: ±${Math.round(gps.accuracy)}m`;

    const btnArrive = document.getElementById('btn-arrive');
    btnArrive.disabled = false;
    btnArrive.className = 'action-btn btn-arrive';
    btn.style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'block';
    const trainEl = document.getElementById('scene-train');
    trainEl.classList.add('active');
    trainEl.classList.remove('stopping');
    setTimeout(() => trainEl.classList.add('running'), 3000);
    saveTravelState();
    showToast('出発を記録しました', 'success');

  } catch(e) {
    btn.disabled = false;
    document.getElementById('status-text').textContent = '待機中';
    document.getElementById('status-text').className = 'status-value status-idle';
    document.getElementById('gps-info').textContent = 'GPS取得失敗: ' + (e.message || '位置情報を許可してください');
    showToast('GPS取得に失敗しました', 'error');
  }
}

// ===== 到着 =====
async function arrive() {
  const btn = document.getElementById('btn-arrive');
  btn.disabled = true;

  document.getElementById('status-text').textContent = 'GPS取得中...';
  document.getElementById('status-text').className = 'status-value gps-loading';

  try {
    const gps = await getGPS();
    state.arriveGPS = gps;
    state.arriveTime = new Date();
    state.phase = 'done';

    const km = calcDistance(state.departGPS, state.arriveGPS);
    state.distance = Math.round(km * 10) / 10;
    const tier = getTravelTier(state.distance);
    state.tier = tier;
    state.allowance = tier.allowance;

    document.getElementById('status-card').className = 'status-card done';
    const trainEl = document.getElementById('scene-train');
    trainEl.classList.remove('running');
    trainEl.classList.add('stopping');
    setTimeout(() => { trainEl.classList.remove('active', 'stopping'); }, 2500);
    document.getElementById('status-text').textContent = '到着完了';
    document.getElementById('status-text').className = 'status-value status-complete';
    document.getElementById('gps-info').innerHTML =
      `出発: ${state.departTime.toLocaleTimeString('ja-JP')} → 到着: ${state.arriveTime.toLocaleTimeString('ja-JP')}<br>` +
      `📍 ${gps.lat.toFixed(6)}, ${gps.lng.toFixed(6)}<br>` +
      `精度: ±${Math.round(gps.accuracy)}m`;

    document.getElementById('result-card').style.display = 'block';
    document.getElementById('result-distance').textContent = state.distance + ' km';
    document.getElementById('result-tier').textContent = tier.label;
    document.getElementById('result-allowance').textContent =
      tier.allowance === 0 ? '¥0（対象外）' : '¥' + tier.allowance.toLocaleString();

    document.getElementById('input-section').style.display = 'block';
    document.getElementById('btn-submit').style.display = 'block';
    btn.style.display = 'none';
    saveTravelState();
    showToast('到着を記録しました', 'success');

  } catch(e) {
    btn.disabled = false;
    showToast('GPS取得に失敗しました', 'error');
  }
}

    record_type: 'travel',

    depart_time: state.departTime.toISOString(),

    arrive_gps: state.arriveGPS,

    tier: state.tier.label,
    allowance: state.allowance,
    purpose: document.getElementById('input-purpose').value.trim(),
    person: document.getElementById('input-person').value.trim(),
    edit_history: [],
    submitted_at: new Date().toISOString(),

  }

  showToast('移動記録を保存しました', 'success');
  resetState();
  loadHistory();

// ===== 出張日程 =====
let tripDays = [];

function buildTripDays() {
  const startVal = document.getElementById('trip-start-date').value;
  const endVal = document.getElementById('trip-end-date').value;
  const list = document.getElementById('trip-days-list');
  const summary = document.getElementById('trip-summary');
  const submitBtn = document.getElementById('btn-trip-submit');

  if (!startVal || !endVal) {
    list.innerHTML = '';
    summary.style.display = 'none';
    submitBtn.style.display = 'none';
    tripDays = [];
    return;
  }

  const start = new Date(startVal);
  const end = new Date(endVal);
  const diff = Math.round((end - start) / 86400000);

  if (diff < 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--danger);font-size:13px;padding:16px;">最終日は出発日以降にしてください</div>';
    summary.style.display = 'none';
    submitBtn.style.display = 'none';
    tripDays = [];
    return;
  }

  const totalDays = diff + 1;
  const allowance = getAccommodationAllowance();
  tripDays = [];

  let html = '';
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startVal);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const dayLabel = d.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', weekday:'short' });
    const isFirst = i === 0;
    const isLast = i === totalDays - 1;
    const isSingleDay = totalDays === 1;

    let badge = '';
    let badgeColor = '#7b5ea7';
    let rowClass = 'trip-date-row';
    if (isSingleDay) {
      badge = '日帰り';
      badgeColor = '#2563eb';
    } else if (isFirst) {
      badge = '出発日';
      badgeColor = '#2563eb';
    } else if (isLast) {
      badge = '最終日（移動日）';
      badgeColor = '#c0392b';
      rowClass = 'trip-date-row last-day';
    } else {
      badge = i + '日目';
    }

    tripDays.push({ date: dateStr, dayLabel, badge, isLast: isLast && !isSingleDay });

    html += `
      <div class="${rowClass}" id="trip-row-${i}">
        <div class="trip-date-header" onclick="toggleTripDetail(${i})">
          <div>
            <span class="trip-date-label">${dayLabel}</span>
            <span class="trip-date-badge" style="background:${badgeColor};margin-left:8px;">${badge}</span>
          </div>
          <span style="font-size:12px;color:var(--text3);">▼</span>
        </div>
        <div class="trip-date-detail" id="trip-detail-${i}">
          <input type="text" class="trip-detail-input" id="trip-purpose-${i}" placeholder="目的（例：〇〇商談、現場確認）">
          <input type="text" class="trip-detail-input" id="trip-person-${i}" placeholder="面談相手（例：〇〇社 田中様）">
        </div>
      </div>`;
  }

  list.innerHTML = html;

  // サマリー表示
  const totalAllow = allowance * totalDays;
  const startStr = start.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
  const endStr = end.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
  document.getElementById('trip-total-allowance').textContent = '¥' + totalAllow.toLocaleString();
  document.getElementById('trip-days-label').textContent = totalDays + '日間';
  document.getElementById('trip-date-range').textContent = startStr + ' 〜 ' + endStr;
  summary.style.display = 'block';
  submitBtn.style.display = 'block';
}

function toggleTripDetail(idx) {
  const detail = document.getElementById('trip-detail-' + idx);
  detail.classList.toggle('open');
}

async function submitTrip() {
  if (tripDays.length === 0) { showToast('出張日程を選択してください', 'error'); return; }

  const btn = document.getElementById('btn-trip-submit');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const allowance = getAccommodationAllowance();
  const now = new Date().toISOString();

  const records = tripDays.map((day, i) => ({
    id: Date.now() + i,
    company_code: currentCompanyCode,
    employee_id: currentEmployee.id,
    employee_name: currentEmployee.name,
    employee_position: currentEmployee.position,
    record_type: 'accommodation',
    date: day.date,
    distance: 0,
    allowance: allowance,
    hotel_name: day.isLast ? '移動日' : '',
    purpose: document.getElementById('trip-purpose-' + i)?.value.trim() || '',
    person: document.getElementById('trip-person-' + i)?.value.trim() || '',
    edit_history: [],
    submitted_at: now,
  }));

  if (!navigator.onLine) {
    addToOfflineQueue(records);
    btn.disabled = false;
    btn.textContent = '📅 出張を記録する';
    showToast(records.length + '日分をオフライン保存しました（オンライン時に自動同期）', 'success');
    resetTripForm();
    return;
  }

  const { error } = await db.from('trip_records').insert(records);

  btn.disabled = false;
  btn.textContent = '📅 出張を記録する';

  if (error) {
    addToOfflineQueue(records);
    showToast('サーバー接続失敗 - ローカルに保存しました', 'success');
    resetTripForm();
    return;
  }

  showToast(records.length + '日分の出張手当を保存しました', 'success');
  resetTripForm();
  loadHistory();
  switchTabByName('history');
}

function resetTripForm() {
  document.getElementById('trip-start-date').value = '';
  document.getElementById('trip-end-date').value = '';
  document.getElementById('trip-days-list').innerHTML = '';
  document.getElementById('trip-summary').style.display = 'none';
  document.getElementById('btn-trip-submit').style.display = 'none';
  tripDays = [];
}

  showToast('出発を取り消しました', 'success');
}

// ===== 状態リセット =====
function resetState() {
  state = { phase:'idle', departTime:null, arriveTime:null, departGPS:null, arriveGPS:null, distance:null, allowance:null, tier:null };
  localStorage.removeItem(OFFLINE_STATE_KEY);

  document.getElementById('status-card').className = 'status-card idle';
  document.getElementById('status-text').textContent = '待機中';
  document.getElementById('status-text').className = 'status-value status-idle';
  document.getElementById('gps-info').textContent = '出発ボタンを押して移動を開始';

  document.getElementById('btn-depart').style.display = 'flex';
  document.getElementById('btn-depart').disabled = false;
  document.getElementById('btn-arrive').style.display = 'flex';
  document.getElementById('btn-arrive').disabled = true;
  document.getElementById('btn-arrive').className = 'action-btn btn-disabled-state';
  document.getElementById('btn-cancel').style.display = 'none';
  const trainEl = document.getElementById('scene-train');
  trainEl.classList.remove('active', 'running', 'stopping');

  document.getElementById('result-card').style.display = 'none';
  document.getElementById('input-section').style.display = 'none';
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('btn-submit').textContent = '✓ この移動を記録する';
  document.getElementById('input-purpose').value = '';
  document.getElementById('input-person').value = '';
}

// ===== 履歴表示 =====
async function loadHistory() {
  if (!currentEmployee) return;

  const now = new Date();
  const yearMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const startDate = `${yearMonth}-01`;
  const nextMonth = now.getMonth() === 11
    ? `${now.getFullYear()+1}-01-01`
    : `${now.getFullYear()}-${String(now.getMonth()+2).padStart(2,'0')}-01`;

  const { data: records, error } = await db
    .from('trip_records')
    .select('*')
    .eq('company_code', currentCompanyCode)
    .eq('employee_id', currentEmployee.id)
    .gte('date', startDate)
    .lt('date', nextMonth)
    .order('date', { ascending: false });

  const list = document.getElementById('history-list');

  if (error || !records || records.length === 0) {
    list.innerHTML = '<div class="empty-state">記録はまだありません</div>';
    return;
  }

  const travelRecords = records.filter(r => r.record_type === 'travel');
  const accRecords = records.filter(r => r.record_type === 'accommodation');
  const totalDistance = travelRecords.reduce((s, r) => s + r.distance, 0);
  const totalTravelAllow = travelRecords.reduce((s, r) => s + r.allowance, 0);
  const totalAccAllow = accRecords.reduce((s, r) => s + r.allowance, 0);

  let html = `
    <div style="background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:16px;margin-bottom:16px;">
      <div style="font-size:11px;color:var(--text2);letter-spacing:0.1em;margin-bottom:10px;">今月の合計</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <div style="font-size:10px;color:var(--text2)">移動距離</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;color:var(--accent)">${Math.round(totalDistance*10)/10} km</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text2)">移動日当</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;color:var(--success)">¥${totalTravelAllow.toLocaleString()}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text2)">出張日数</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;color:var(--accent2)">${accRecords.length} 日</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text2)">出張手当</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;color:var(--success)">¥${totalAccAllow.toLocaleString()}</div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;display:flex;justify-content:space-between;">
        <div style="font-size:12px;color:var(--text2)">日当合計</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--success)">¥${(totalTravelAllow + totalAccAllow).toLocaleString()}</div>
      </div>
    </div>
  `;

  records.forEach(r => {
    const date = new Date(r.date);
    const dateStr = date.toLocaleDateString('ja-JP', { month:'2-digit', day:'2-digit', weekday:'short' });
    const isTravel = r.record_type === 'travel';

    html += `
      <div class="history-item">
        <div class="history-date">
          <span class="record-type-badge ${isTravel ? 'badge-travel' : 'badge-accommodation'}">${isTravel ? '移動' : '出張'}</span>
          ${dateStr}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            ${isTravel
              ? `<span class="history-distance">${r.distance} km</span><span style="color:var(--text3);margin:0 8px;font-size:12px;">${r.tier}</span>`
              : `<span style="font-size:14px;color:var(--accent2);">🏨 ${r.hotel_name || ''}</span>`
            }
          </div>
          <span class="history-allowance">${r.allowance === 0 ? '対象外' : '¥'+r.allowance.toLocaleString()}</span>
        </div>
        ${r.purpose ? `<div class="history-purpose">${r.purpose}${r.person ? ' / ' + r.person : ''}</div>` : ''}
      </div>
    `;
  });

  list.innerHTML = html;
}

// ===== タブ切替 =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') loadHistory();
}

function switchTabByName(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.includes(name === 'record' ? '記録' : '履歴')) b.classList.add('active');
  });
}

// ===== トースト =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2500);
}

// ===== ログイン後処理 =====
function afterLogin() {
  updateOnlineStatus();
  updateOfflineBadge();

  // 移動中の状態を復元
  if (restoreTravelState()) {
    if (state.phase === 'traveling' && state.departGPS) {
      document.getElementById('status-card').className = 'status-card traveling';
      document.getElementById('status-text').textContent = '移動中';
      document.getElementById('status-text').className = 'status-value status-moving';
      document.getElementById('gps-info').innerHTML =
        `出発: ${state.departTime.toLocaleTimeString('ja-JP')}<br>` +
        `📍 ${state.departGPS.lat.toFixed(6)}, ${state.departGPS.lng.toFixed(6)}<br>` +
        `精度: ±${Math.round(state.departGPS.accuracy)}m`;
      document.getElementById('btn-depart').style.display = 'none';
      document.getElementById('btn-cancel').style.display = 'block';
      const btnArrive = document.getElementById('btn-arrive');
      btnArrive.disabled = false;
      btnArrive.className = 'action-btn btn-arrive';
      showToast('移動中の状態を復元しました', 'success');
    } else if (state.phase === 'done' && state.distance != null) {
      document.getElementById('status-card').className = 'status-card done';
      document.getElementById('status-text').textContent = '到着完了';
      document.getElementById('status-text').className = 'status-value status-complete';
      document.getElementById('gps-info').innerHTML =
        `出発: ${state.departTime.toLocaleTimeString('ja-JP')} → 到着: ${state.arriveTime.toLocaleTimeString('ja-JP')}`;
      document.getElementById('result-card').style.display = 'block';
      document.getElementById('result-distance').textContent = state.distance + ' km';
      document.getElementById('result-tier').textContent = state.tier.label;
      document.getElementById('result-allowance').textContent =
        state.tier.allowance === 0 ? '¥0（対象外）' : '¥' + state.tier.allowance.toLocaleString();
      document.getElementById('input-section').style.display = 'block';
      document.getElementById('btn-submit').style.display = 'block';
      document.getElementById('btn-depart').style.display = 'none';
      document.getElementById('btn-arrive').style.display = 'none';
      showToast('到着済みの状態を復元しました', 'success');
    }
  }

  // オンラインなら未同期キューを同期
  if (navigator.onLine) {
    syncOfflineQueue();
  }
}

updateDate();
updateOnlineStatus();
